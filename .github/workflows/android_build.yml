name: Build Signed AAB and APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate Project and Install
        run: |
          PROJECT_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs -I {} dirname "{}")
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          cd "$PROJECT_PATH"
          npm config set strict-ssl false
          npm install --include=dev --legacy-peer-deps

      - name: Build Web App
        run: |
          cd "${{ env.PROJECT_PATH }}"
          npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: |
          cd "${{ env.PROJECT_PATH }}"
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi
          npx cap sync android

      - name: Build Unsigned AAB and APK
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
          ANDROID_PATH=$(dirname "$GRADLEW_PATH")
          cd "$ANDROID_PATH"
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Prepare Files for Signing
        run: |
          mkdir -p to_sign
          # Find and copy the AAB and APK to the clean folder
          find . -name "*.aab" -exec cp {} to_sign/ \;
          find . -name "*.apk" -exec cp {} to_sign/ \;
          echo "Files to sign:"
          ls to_sign

      - name: Sign Android Release (AAB & APK)
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: to_sign
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          # This tells the tool where the Android SDK is located on GitHub's servers
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-signed-builds
          path: |
            to_sign/*-signed.aab
            to_sign/*-signed.apk
