name: Build Android AAB
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Locate Project and Install
        run: |
          # This finds where your package.json is located
          PROJECT_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Project found in: $PROJECT_PATH"
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          
          cd $PROJECT_PATH
          npm config set strict-ssl false
          npm install --include=dev --legacy-peer-deps

      - name: Build Web App
        run: |
          cd ${{ env.PROJECT_PATH }}
          # We use 'npm run build' which is safer than npx
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: |
          cd ${{ env.PROJECT_PATH }}
          # Ensure capacitor is installed and sync
          npx cap sync android

      - name: Build AAB with Gradle
        run: |
          # Find the android folder
          ANDROID_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd $ANDROID_PATH
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-release-aab
          # This finds the generated AAB regardless of path
          path: "**/app-release.aab"
