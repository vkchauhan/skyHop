name: Build Android AAB
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up future builds

      - name: Install Dependencies
        run: |
          npm config set strict-ssl false
          # Using --include=dev ensures vite and build tools are installed
          npm install --include=dev --legacy-peer-deps

      - name: Debug Project Structure
        run: |
          echo "Listing files in root:"
          ls -R
          echo "Checking for Vite:"
          npx vite --version

      - name: Build Web App
        # We use 'npx vite build' directly to bypass potential script errors
        run: npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build AAB with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
