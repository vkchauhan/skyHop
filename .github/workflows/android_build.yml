name: Build and Sign Android AAB
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate Project and Install
        run: |
          PROJECT_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs -I {} dirname "{}")
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          cd "$PROJECT_PATH"
          npm config set strict-ssl false
          npm install --include=dev --legacy-peer-deps

      - name: Build Web App
        run: |
          cd "${{ env.PROJECT_PATH }}"
          npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: |
          cd "${{ env.PROJECT_PATH }}"
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi
          npx cap sync android

      - name: Build Unsigned AAB
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
          ANDROID_PATH=$(dirname "$GRADLEW_PATH")
          cd "$ANDROID_PATH"
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon
          
          # Save the path of the unsigned AAB for the next step
          UNSIGNED_AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          echo "UNSIGNED_AAB_PATH=$ANDROID_PATH/$UNSIGNED_AAB" >> $GITHUB_ENV

      - name: Sign Android AAB
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ env.PROJECT_PATH }}/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Signed AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-signed-release-aab
          # The signing action creates a new file, usually with '-signed' in the name
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
