name: Build Android AAB
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate Project and Install
        run: |
          PROJECT_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs -I {} dirname "{}")
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          
          cd "$PROJECT_PATH"
          npm config set strict-ssl false
          npm install --include=dev --legacy-peer-deps

      - name: Build Web App
        run: |
          cd "${{ env.PROJECT_PATH }}"
          npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Updated to Java 21 to match your project requirements

      - name: Sync Capacitor
        run: |
          cd "${{ env.PROJECT_PATH }}"
          
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi
          
          npx cap sync android

      - name: Build AAB with Gradle
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
          ANDROID_PATH=$(dirname "$GRADLEW_PATH")
          cd "$ANDROID_PATH"
          
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-release-aab
          path: "**/app-release.aab"
