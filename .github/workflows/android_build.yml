name: Build Android AAB
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate Project and Install
        run: |
          # Find package.json and handle special characters in paths
          PROJECT_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs -I {} dirname "{}")
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          
          cd "$PROJECT_PATH"
          npm config set strict-ssl false
          npm install --include=dev --legacy-peer-deps

      - name: Build Web App
        run: |
          cd "${{ env.PROJECT_PATH }}"
          # Build the web assets (creates the 'dist' folder)
          npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: |
          cd "${{ env.PROJECT_PATH }}"
          
          # Force create the android folder if it's missing or incomplete
          if [ ! -f "android/gradlew" ]; then
            echo "Android folder or gradlew missing. Adding android platform..."
            # Remove existing android folder if it's corrupted/empty
            rm -rf android
            npx cap add android
          fi
          
          # Sync web assets to the android project
          npx cap sync android

      - name: Build AAB with Gradle
        run: |
          # Find the android folder safely
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew file not found even after sync!"
            ls -R
            exit 1
          fi
          
          ANDROID_PATH=$(dirname "$GRADLEW_PATH")
          cd "$ANDROID_PATH"
          
          echo "Building AAB in $ANDROID_PATH..."
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyhop-release-aab
          path: "**/app-release.aab"
